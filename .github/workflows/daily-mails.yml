name: Daily Cold Mails

# Roz chalega + manually bhi chala sakte ho (Actions tab se "Run workflow")
on:
  schedule:
    # UTC time. 09:00 PKT = 04:00 UTC. Apne hisaab se badal lena.
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write # taaki report commit/push kar sake

jobs:
  send-mails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Send mails + follow-ups + report
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          SENDER_TITLE: ${{ secrets.SENDER_TITLE }}
          DAILY_SEND_LIMIT: ${{ secrets.DAILY_SEND_LIMIT }}
          MIN_DELAY_SECONDS: ${{ secrets.MIN_DELAY_SECONDS }}
          MAX_DELAY_SECONDS: ${{ secrets.MAX_DELAY_SECONDS }}
        run: npm run daily

      - name: Commit & push report
        run: |
          git config user.name "cold-mail-bot"
          git config user.email "bot@users.noreply.github.com"
          git add logs/report.md
          if git diff --staged --quiet; then
            echo "No changes to report"
          else
            git commit -m "📊 Daily report: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
