name: Daily Cold Mails

# Roz kai baar chalega + manually bhi (Actions tab se "Run workflow")
# Din me kai timings — agar ek run fail ho to agle ghante retry ho jaye.
# Daily limit phir bhi safe hai: total sirf DAILY_SEND_LIMIT emails/day jayengi.
on:
  schedule:
    # UTC time (PKT = UTC+5). 9,10,11,12,2 baje PKT:
    - cron: "0 4 * * *"  #  9:00 AM PKT
    - cron: "0 5 * * *"  # 10:00 AM PKT
    - cron: "0 6 * * *"  # 11:00 AM PKT
    - cron: "0 7 * * *"  # 12:00 PM PKT
    - cron: "0 9 * * *"  #  2:00 PM PKT
  workflow_dispatch: {}

permissions:
  contents: write # taaki report commit/push kar sake

jobs:
  send-mails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # CV (assets/cv.pdf) repo me committed hai, isliye checkout ke saath hi aa jati
      # hai — job emails ke saath attach ho jati hai. Koi alag step nahi chahiye.

      - name: Source (job-board APIs only) + personalize + send + follow-ups + report
        env:
          CV_FILENAME: Areesha-Rafiq-CV.pdf
          # job boards = public APIs (koi browser nahi). Heavy Google Maps sourcing
          # alag "Daily Lead Sourcing" workflow (daily-sourcing.yml) me 1x/din hoti hai.
          SCRAPE_MODE: jobs
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          CAMPAIGN: ${{ secrets.CAMPAIGN }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          SENDER_TITLE: ${{ secrets.SENDER_TITLE }}
          SENDER_ADDRESS: ${{ secrets.SENDER_ADDRESS }}
          TRACK_BASE_URL: ${{ secrets.TRACK_BASE_URL }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          DAILY_SEND_LIMIT: ${{ secrets.DAILY_SEND_LIMIT }}
          MIN_DELAY_SECONDS: ${{ secrets.MIN_DELAY_SECONDS }}
          MAX_DELAY_SECONDS: ${{ secrets.MAX_DELAY_SECONDS }}
        continue-on-error: true
        run: npm run daily

      # Report commit/push. continue-on-error: true taaki agar 5 schedules ek saath
      # chalein aur push race (non-fast-forward) ho to poori run "failed" na dikhe —
      # emails to ja chuki hoti hain. Push se pehle rebase + 3 retries.
      - name: Commit & push report
        if: always()
        continue-on-error: true
        run: |
          git config user.name "cold-mail-bot"
          git config user.email "bot@users.noreply.github.com"
          git add logs/report.md
          if git diff --staged --quiet; then
            echo "No changes to report"
            exit 0
          fi
          git commit -m "📊 Daily report: $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main || true
            if git push origin HEAD:main; then
              echo "✅ report pushed"
              exit 0
            fi
            echo "push race (try $i) — retrying..."
            sleep 5
          done
          echo "⚠️ report push skipped (push race) — emails already sent, ignoring"
