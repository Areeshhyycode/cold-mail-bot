<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  :root{--bg:#0d1117;--card:#161b22;--border:#27303b;--txt:#e6edf3;--mut:#8b949e;--accent:#2f81f7;--green:#3fb950;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{width:380px;max-height:580px;overflow-y:auto;background:var(--bg);color:var(--txt);padding:12px}
  h1{font-size:15px;margin-bottom:2px}
  .sub{color:var(--mut);font-size:11px;margin-bottom:10px}
  button{background:var(--accent);color:#fff;border:0;border-radius:7px;padding:8px 10px;font-size:13px;cursor:pointer}
  button.ghost{background:var(--card);border:1px solid var(--border);color:var(--txt)}
  button:hover{opacity:.9}
  .row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
  .row button{flex:1;min-width:90px}
  .count{font-size:11px;color:var(--mut);margin:6px 0}
  .job{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:6px;font-size:12px}
  .job .t{font-weight:600;color:#79c0ff}
  .job .c{color:var(--txt)}.job .m{color:var(--mut);font-size:11px}
  .job a{color:var(--accent);text-decoration:none;font-size:11px}
  .job .acts{display:flex;gap:6px;margin-top:5px}
  .job .acts button{flex:0;padding:3px 8px;font-size:11px}
  details{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:8px}
  summary{cursor:pointer;font-size:13px;font-weight:600}
  label{display:block;font-size:11px;color:var(--mut);margin:6px 0 2px}
  input,textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:6px;font-size:12px}
  textarea{resize:vertical;min-height:120px;font-family:inherit}
  .empty{color:var(--mut);font-size:12px;text-align:center;padding:14px}
  .toast{position:sticky;top:0;background:var(--green);color:#06210f;font-size:11px;padding:5px;border-radius:6px;text-align:center;margin-bottom:8px;display:none}
</style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <h1>🧩 Job Apply Assistant</h1>
  <div class="sub">Page scan karo → jobs collect → aap khud apply karo</div>

  <div class="row">
    <button id="scan">🔍 Scan this page</button>
    <button id="export" class="ghost">⬇ CSV</button>
    <button id="clear" class="ghost">🗑 Clear</button>
  </div>
  <div class="count" id="count"></div>

  <details>
    <summary>👤 My profile (cover letter ke liye)</summary>
    <label>Name</label><input id="p_name" placeholder="Areesha Rafiq" />
    <label>Email</label><input id="p_email" placeholder="areeshazv@gmail.com" />
    <label>Phone</label><input id="p_phone" placeholder="+92 322 3007388" />
    <label>Portfolio</label><input id="p_portfolio" placeholder="https://portfolio-szj4.vercel.app/" />
    <label>One-line pitch</label>
    <input id="p_pitch" placeholder="Full Stack Developer (MERN + Next.js)" />
    <div class="row" style="margin-top:8px"><button id="saveProfile">💾 Save profile</button></div>
  </details>

  <div id="list"></div>

  <details id="clBox" style="display:none">
    <summary>✍️ Cover letter</summary>
    <textarea id="cl"></textarea>
    <div class="row" style="margin-top:6px"><button id="copyCl">📋 Copy</button></div>
  </details>

  <script src="popup.js"></script>
</body>
</html>
