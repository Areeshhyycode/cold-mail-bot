<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova — AI Assistant</title>
<style>
  :root{--bg:#0d1117;--card:#161b22;--border:#27303b;--txt:#e6edf3;--mut:#8b949e;--accent:#2f81f7;--green:#3fb950;--red:#f85149;--amber:#d29922;--purple:#bc8cff;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;overflow:hidden}
  a{color:var(--accent);text-decoration:none}

  /* ---------------- sidebar ---------------- */
  .side{width:260px;background:#0b0f14;border-right:1px solid var(--border);display:flex;flex-direction:column;flex:0 0 260px}
  .side header{padding:14px;border-bottom:1px solid var(--border)}
  .side h1{font-size:15px;display:flex;align-items:center;gap:7px}
  .side .nav{font-size:11px;color:var(--mut);margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
  .newchat{margin:10px;padding:9px;background:var(--accent);color:#fff;border:0;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
  .newchat:hover{opacity:.9}
  .csearch{margin:0 10px 8px;padding:7px 10px;background:var(--card);border:1px solid var(--border);color:var(--txt);border-radius:7px;font-size:12px;width:calc(100% - 20px)}
  .clist{flex:1;overflow-y:auto;padding:0 8px 10px}
  .citem{padding:8px 10px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--mut);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .citem:hover{background:var(--card);color:var(--txt)}
  .citem.on{background:var(--card);color:var(--txt);border-left:2px solid var(--accent)}
  .side footer{padding:10px;border-top:1px solid var(--border);font-size:11px;color:var(--mut)}
  .side select{background:var(--card);border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:4px 6px;font-size:11px;width:100%;margin-top:4px}

  /* ---------------- main ---------------- */
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .msgs{flex:1;overflow-y:auto;padding:24px 0}
  .wrap{max-width:820px;margin:0 auto;padding:0 20px}

  .msg{margin-bottom:22px;display:flex;gap:12px}
  .avatar{width:28px;height:28px;border-radius:7px;flex:0 0 28px;display:grid;place-items:center;font-size:14px}
  .msg.user .avatar{background:#1f2937}
  .msg.bot .avatar{background:linear-gradient(135deg,#2f81f7,#bc8cff)}
  .body{flex:1;min-width:0;font-size:14px;line-height:1.65;padding-top:3px}

  /* markdown */
  .body h1,.body h2,.body h3{font-size:15px;margin:14px 0 6px}
  .body p{margin:0 0 10px}
  .body ul,.body ol{margin:0 0 10px 20px}
  .body li{margin-bottom:3px}
  .body code{background:#1c2330;padding:2px 5px;border-radius:4px;font-size:12.5px;font-family:ui-monospace,Consolas,monospace}
  .body pre{background:#0b0f14;border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;margin:0 0 10px}
  .body pre code{background:none;padding:0;font-size:12.5px;line-height:1.5}
  .body table{border-collapse:collapse;width:100%;margin:0 0 12px;font-size:12.5px;display:block;overflow-x:auto}
  .body th,.body td{border:1px solid var(--border);padding:7px 10px;text-align:left;white-space:nowrap}
  .body th{background:var(--card);color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .body blockquote{border-left:3px solid var(--accent);background:#111722;padding:9px 13px;margin:0 0 10px;border-radius:0 7px 7px 0;font-size:13px;color:#c9d4e0}
  .body blockquote strong{color:var(--txt)}
  .body a{text-decoration:underline}
  .body strong{color:#fff}

  /* tool trace */
  .tools{margin:0 0 10px;display:flex;flex-direction:column;gap:4px}
  .tool{font-size:11.5px;color:var(--mut);background:#11161d;border:1px solid var(--border);border-radius:6px;padding:5px 9px;display:flex;align-items:center;gap:7px}
  .tool .n{color:#79c0ff;font-family:ui-monospace,Consolas,monospace}
  .tool.err{border-color:#5a2a2a;color:#f0a0a0}
  .tool .sp{width:9px;height:9px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .tool .ok{color:var(--green)}

  /* confirm box */
  .confirm{background:#2a1f10;border:1px solid var(--amber);border-radius:9px;padding:13px;margin:10px 0}
  .confirm h4{font-size:13px;color:var(--amber);margin-bottom:5px}
  .confirm p{font-size:12.5px;color:#e0d0b0;margin-bottom:10px}
  .confirm button{padding:7px 14px;border:0;border-radius:7px;cursor:pointer;font-size:12.5px;margin-right:7px;font-weight:600}
  .cy{background:var(--red);color:#fff}.cn{background:var(--card);color:var(--txt);border:1px solid var(--border)}

  /* recommendations */
  .recs{margin-bottom:20px}
  .recs h3{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
  .rec{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
  .rec:hover{border-left-color:var(--green);background:#1a212b}
  .rec .t{font-size:13px;font-weight:600;margin-bottom:3px}
  .rec .d{font-size:12px;color:var(--mut);line-height:1.5}
  .rec .m{font-size:10.5px;color:#5a6270;margin-top:5px}

  .hello{text-align:center;padding:30px 0 22px}
  .hello .big{font-size:26px;margin-bottom:6px}
  .hello .sm{color:var(--mut);font-size:13px}
  .chips{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:16px}
  .chip{background:var(--card);border:1px solid var(--border);color:var(--mut);padding:7px 13px;border-radius:18px;cursor:pointer;font-size:12px}
  .chip:hover{border-color:var(--accent);color:var(--txt)}

  /* composer */
  .composer{border-top:1px solid var(--border);background:var(--bg);padding:14px 0 18px}
  .cbox{max-width:820px;margin:0 auto;padding:0 20px;display:flex;gap:9px;align-items:flex-end}
  textarea{flex:1;background:var(--card);border:1px solid var(--border);color:var(--txt);border-radius:11px;padding:12px 14px;font-size:14px;font-family:inherit;resize:none;max-height:180px;line-height:1.5}
  textarea:focus{outline:none;border-color:var(--accent)}
  .send{background:var(--accent);color:#fff;border:0;border-radius:10px;width:42px;height:42px;cursor:pointer;font-size:17px;flex:0 0 42px}
  .send:disabled{opacity:.4;cursor:default}
  .hint{max-width:820px;margin:7px auto 0;padding:0 20px;font-size:10.5px;color:#5a6270}
  .cursor{display:inline-block;width:7px;height:15px;background:var(--accent);animation:blink 1s steps(2) infinite;vertical-align:text-bottom;margin-left:1px}
  @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
  .err{color:var(--red);font-size:12.5px;background:#2a1515;border:1px solid #5a2a2a;padding:9px 12px;border-radius:7px}
</style>
</head>
<body>
  <aside class="side">
    <header>
      <h1>✨ Nova</h1>
      <div class="nav">
        <a href="/">Leads</a><a href="/jobs">Jobs</a><a href="/businesses">Businesses</a><a href="/outreach">Outreach</a>
      </div>
    </header>
    <button class="newchat" id="newChat">＋ New chat</button>
    <input class="csearch" id="csearch" placeholder="🔍 search chats…" />
    <div class="clist" id="clist"></div>
    <footer>
      Role
      <select id="role">
        <option value="admin">Admin — full access</option>
        <option value="manager">Manager</option>
        <option value="sales">Sales — business/outreach</option>
        <option value="recruiter">Recruiter — jobs only</option>
        <option value="viewer">Viewer — read only</option>
      </select>
    </footer>
  </aside>

  <main class="main">
    <div class="msgs" id="msgs"><div class="wrap" id="wrap"></div></div>
    <div class="composer">
      <div class="cbox">
        <textarea id="input" rows="1" placeholder="Kuch bhi poochho… 'DHA me bina website wale restaurants dhoondo' ya 'show my strongest jobs'"></textarea>
        <button class="send" id="send">➤</button>
      </div>
      <div class="hint">Nova tumhare saare modules chala sakti hai. Asli email bhejne se pehle hamesha poochhegi. Enter = bhejo · Shift+Enter = nayi line</div>
    </div>
  </main>

<script>
const $ = (id) => document.getElementById(id);
let convId = null;
let streaming = false;
let pendingConfirm = null;

/* ------------------------- tiny markdown renderer ------------------------ */
/* Koi external library nahi (CSP + offline). Order maayne rakhta hai:
   pehle code blocks nikaal lo (placeholder se), taake unke andar ka
   markdown/HTML process na ho. */
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function md(src){
  if(!src) return "";
  const blocks=[];
  let t=String(src);

  // fenced code
  t=t.replace(/```(\w*)\n?([\s\S]*?)```/g,(m,lang,code)=>{
    blocks.push('<pre><code>'+esc(code.replace(/\n$/,''))+'</code></pre>');
    return '␀B'+(blocks.length-1)+'␀';
  });
  // inline code
  t=t.replace(/`([^`\n]+)`/g,(m,c)=>{
    blocks.push('<code>'+esc(c)+'</code>');
    return '␀B'+(blocks.length-1)+'␀';
  });

  t=esc(t);

  // tables (| a | b |)
  t=t.replace(/(^\|.+\|[ \t]*\n\|[ \t:\-|]+\|[ \t]*\n(?:\|.*\|[ \t]*\n?)*)/gm,(tbl)=>{
    const rows=tbl.trim().split('\n').filter(r=>r.trim());
    if(rows.length<2) return tbl;
    const cells=r=>r.replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
    const head=cells(rows[0]);
    const bodyRows=rows.slice(2).map(cells);
    return '<table><thead><tr>'+head.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>'
      +bodyRows.map(r=>'<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('')+'</tbody></table>';
  });

  // blockquote (consecutive > lines -> one block)
  t=t.replace(/(^&gt;[^\n]*(?:\n&gt;[^\n]*)*)/gm,(b)=>
    '<blockquote>'+b.split('\n').map(l=>l.replace(/^&gt;\s?/,'')).join('<br/>')+'</blockquote>');

  t=t.replace(/^###\s+(.+)$/gm,'<h3>$1</h3>')
     .replace(/^##\s+(.+)$/gm,'<h2>$1</h2>')
     .replace(/^#\s+(.+)$/gm,'<h1>$1</h1>');
  t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
     .replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<em>$2</em>');
  t=t.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');

  // lists
  t=t.replace(/(^(?:[-*]\s+.+\n?)+)/gm,(b)=>'<ul>'+b.trim().split('\n').map(l=>'<li>'+l.replace(/^[-*]\s+/,'')+'</li>').join('')+'</ul>');
  t=t.replace(/(^(?:\d+\.\s+.+\n?)+)/gm,(b)=>'<ol>'+b.trim().split('\n').map(l=>'<li>'+l.replace(/^\d+\.\s+/,'')+'</li>').join('')+'</ol>');

  // paragraphs
  t=t.split(/\n{2,}/).map(p=>{
    const s=p.trim();
    if(!s) return '';
    if(/^<(h[123]|ul|ol|table|pre|blockquote)/.test(s)) return s;
    return '<p>'+s.replace(/\n/g,'<br/>')+'</p>';
  }).join('');

  return t.replace(/␀B(\d+)␀/g,(m,i)=>blocks[+i]);
}

/* ------------------------------- rendering ------------------------------- */
function addMsg(role, html){
  const d=document.createElement('div');
  d.className='msg '+(role==='user'?'user':'bot');
  d.innerHTML='<div class="avatar">'+(role==='user'?'🧑':'✨')+'</div><div class="body">'+html+'</div>';
  $('wrap').appendChild(d);
  scroll();
  return d.querySelector('.body');
}
function scroll(){ const m=$('msgs'); m.scrollTop=m.scrollHeight; }

function toolLine(name,state,meta){
  const okTxt = meta && meta.count!=null ? meta.count+' results' : 'done';
  if(state==='run') return '<div class="tool" data-t="'+name+'"><span class="sp"></span><span class="n">'+esc(name)+'</span><span>chal raha hai…</span></div>';
  if(state==='err') return '<div class="tool err" data-t="'+name+'"><span>✕</span><span class="n">'+esc(name)+'</span><span>'+esc(meta||'fail')+'</span></div>';
  return '<div class="tool" data-t="'+name+'"><span class="ok">✓</span><span class="n">'+esc(name)+'</span><span>'+esc(okTxt)+(meta&&meta.source?' · '+esc(meta.source):'')+'</span></div>';
}

/* ------------------------------ chat sending ----------------------------- */
async function send(text, confirm){
  if(streaming) return;
  text=(text||$('input').value).trim();
  if(!text && !confirm) return;

  if(text){ addMsg('user', md(text)); }
  $('input').value=''; autosize();
  streaming=true; $('send').disabled=true;
  pendingConfirm=null;

  const body=addMsg('bot','');
  const toolsBox=document.createElement('div'); toolsBox.className='tools'; body.appendChild(toolsBox);
  const textBox=document.createElement('div'); body.appendChild(textBox);
  const cur=document.createElement('span'); cur.className='cursor'; textBox.appendChild(cur);

  let acc='';
  try{
    const res=await fetch('/api/assistant/chat',{
      method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({message:text||'(confirmed)',conversationId:convId,role:$('role').value,confirm:confirm?[confirm]:[]})
    });
    if(!res.ok){ throw new Error('HTTP '+res.status); }

    const reader=res.body.getReader(); const dec=new TextDecoder(); let buf='';
    while(true){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      const parts=buf.split('\n\n'); buf=parts.pop();
      for(const p of parts){
        const ev=(p.match(/^event: (.+)$/m)||[])[1];
        const dt=(p.match(/^data: ([\s\S]+)$/m)||[])[1];
        if(!ev||!dt) continue;
        let d; try{ d=JSON.parse(dt); }catch{ continue; }

        if(ev==='meta'){ convId=d.conversationId; loadChats(); }
        else if(ev==='token'){ acc+=d.text; textBox.innerHTML=md(acc); textBox.appendChild(cur); scroll(); }
        else if(ev==='tool_start'){ toolsBox.insertAdjacentHTML('beforeend', toolLine(d.name,'run')); scroll(); }
        else if(ev==='tool_end'){
          const el=[...toolsBox.querySelectorAll('[data-t="'+d.name+'"]')].pop();
          const html=d.ok?toolLine(d.name,'ok',d.meta):toolLine(d.name,'err',d.error);
          if(el) el.outerHTML=html; else toolsBox.insertAdjacentHTML('beforeend',html);
          scroll();
        }
        else if(ev==='confirm_required'){ pendingConfirm=d; }
        else if(ev==='error'){ textBox.innerHTML='<div class="err">❌ '+esc(d.error)+'</div>'; }
        else if(ev==='done'){
          textBox.innerHTML=md(acc);
          if(pendingConfirm) showConfirm(body,pendingConfirm);
        }
      }
    }
  }catch(e){
    textBox.innerHTML='<div class="err">❌ '+esc(e.message)+'<br/>Backend chal raha hai? <code>npm run dashboard</code></div>';
  }finally{
    cur.remove(); streaming=false; $('send').disabled=false; $('input').focus(); scroll();
  }
}

function showConfirm(body,c){
  const d=document.createElement('div'); d.className='confirm';
  d.innerHTML='<h4>⚠️ Confirmation chahiye</h4><p>Nova <code>'+esc(c.tool)+'</code> chalana chahti hai — ye ASLI duniya me action lega (wapas nahi hoga).<br/><br/><b>Args:</b> <code>'+esc(JSON.stringify(c.args))+'</code></p>'
    +'<button class="cy">Haan, karo</button><button class="cn">Nahi, rehne do</button>';
  body.appendChild(d); scroll();
  d.querySelector('.cy').onclick=()=>{ d.remove(); send('Haan, confirm — kar do.', c.tool); };
  d.querySelector('.cn').onclick=()=>{ d.innerHTML='<p style="color:var(--mut);font-size:12px">Cancel kar diya — kuch nahi bheja gaya.</p>'; };
}

/* --------------------------- recommendations ----------------------------- */
async function loadHome(){
  $('wrap').innerHTML='';
  const h=document.createElement('div'); h.className='hello';
  h.innerHTML='<div class="big">✨ Nova</div><div class="sm">Tumhare poore platform ki AI assistant — jobs, businesses, outreach, analytics.</div>'
    +'<div class="chips">'
    +['Show today\'s analytics','Find businesses in DHA without websites','Show my strongest job matches','Who replied to my outreach?','What should I do today?']
      .map(c=>'<span class="chip">'+esc(c)+'</span>').join('')
    +'</div>';
  $('wrap').appendChild(h);
  h.querySelectorAll('.chip').forEach(c=>c.onclick=()=>send(c.textContent));

  try{
    const r=await (await fetch('/api/assistant/recommendations')).json();
    if(r.recommendations && r.recommendations.length){
      const box=document.createElement('div'); box.className='recs';
      box.innerHTML='<h3>💡 Tumhare data se — abhi dekhne layak</h3>'
        +r.recommendations.map(x=>'<div class="rec" data-a="'+esc(x.action||'')+'">'
          +'<div class="t">'+esc(x.icon||'•')+' '+esc(x.title)+'</div>'
          +'<div class="d">'+esc(x.detail||'')+'</div>'
          +'<div class="m">Why: '+esc(x.why||'—')+' · '+(x.confidence!=null?x.confidence+'% confidence':'')+' · '+esc((x.sources||[]).join(', '))+'</div>'
        +'</div>').join('');
      $('wrap').appendChild(box);
      box.querySelectorAll('.rec').forEach(el=>el.onclick=()=>{ if(el.dataset.a) send(el.dataset.a); });
    }
  }catch{}
  scroll();
}

/* ------------------------------ chat history ----------------------------- */
async function loadChats(q){
  try{
    const url=q?('/api/assistant/search?q='+encodeURIComponent(q)):'/api/assistant/conversations';
    const r=await (await fetch(url)).json();
    $('clist').innerHTML=(r.conversations||[]).map(c=>
      '<div class="citem '+(String(c._id)===convId?'on':'')+'" data-id="'+c._id+'">'+esc(c.title||'Chat')+'</div>').join('')
      || '<div class="citem" style="cursor:default">Koi chat nahi</div>';
    $('clist').querySelectorAll('[data-id]').forEach(el=>el.onclick=()=>openChat(el.dataset.id));
  }catch{}
}

async function openChat(id){
  try{
    const r=await (await fetch('/api/assistant/conversation?id='+id)).json();
    if(!r.conversation) return;
    convId=id; $('wrap').innerHTML='';
    for(const m of r.conversation.messages){
      if(m.role==='system') continue;
      if(m.role==='user'){ addMsg('user', md(m.content)); continue; }
      const b=addMsg('bot','');
      if(m.toolCalls&&m.toolCalls.length){
        const tb=document.createElement('div'); tb.className='tools';
        tb.innerHTML=m.toolCalls.map(t=>t.ok?toolLine(t.name,'ok',t.meta):toolLine(t.name,'err',t.error)).join('');
        b.appendChild(tb);
      }
      const tx=document.createElement('div'); tx.innerHTML=md(m.content); b.appendChild(tx);
    }
    loadChats(); scroll();
  }catch{}
}

/* -------------------------------- events --------------------------------- */
function autosize(){ const t=$('input'); t.style.height='auto'; t.style.height=Math.min(t.scrollHeight,180)+'px'; }
$('input').addEventListener('input',autosize);
$('input').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); }});
$('send').onclick=()=>send();
$('newChat').onclick=()=>{ convId=null; loadHome(); loadChats(); };
let st; $('csearch').oninput=()=>{ clearTimeout(st); st=setTimeout(()=>loadChats($('csearch').value.trim()),250); };
$('role').onchange=()=>{ localStorage.setItem('novaRole',$('role').value); };

$('role').value=localStorage.getItem('novaRole')||'admin';
loadHome(); loadChats(); $('input').focus();
</script>
</body>
</html>
